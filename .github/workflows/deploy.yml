name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Create static routes for direct URL access
        run: |
          mkdir -p dist/work/coffee
          cp dist/index.html dist/work/coffee/index.html
          mkdir -p dist/gallery
          cp dist/index.html dist/gallery/index.html
          mkdir -p dist/work/documentaries
          cp dist/index.html dist/work/documentaries/index.html
          mkdir -p dist/work/commercials
          cp dist/index.html dist/work/commercials/index.html
          mkdir -p dist/about
          cp dist/index.html dist/about/index.html
          mkdir -p dist/contact
          cp dist/index.html dist/contact/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
